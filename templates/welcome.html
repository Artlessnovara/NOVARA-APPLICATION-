{% extends "base.html" %}

{% block styles %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/welcome.css') }}">
{% endblock %}

{% block content %}
<div class="welcome-page-container">
    <div id="welcomeCarousel" class="carousel slide" data-ride="carousel" data-interval="false">
        <div class="carousel-inner text-center">
            <!-- Slide 1: Intro -->
            <div class="carousel-item active">
                <div>
                    <h1>Welcome to Scholars Novara Institute.</h1>
                </div>
            </div>
            <!-- Slide 2: What the app offers -->
            <div class="carousel-item">
                <div>
                    <h2>What We Offer</h2>
                    <p class="lead">Education, Innovation, Lifestyle, Creativity.</p>
                </div>
            </div>
            <!-- Slide 3: Call to action -->
            <div class="carousel-item">
                <div>
                    <h2>Join our community today.</h2>
                    <a href="{{ url_for('main.welcome_complete') }}" class="btn btn-light btn-lg mt-3">Get Started</a>
                </div>
            </div>
        </div>
        <!-- Carousel Controls -->
        <a class="carousel-control-prev" href="#welcomeCarousel" role="button" data-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#welcomeCarousel" role="button" data-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </a>
    </div>
</div>
{% endblock %}
