<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Scholars Novara</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }
    </style>
</head>
<body>
    <p>Loading...</p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if the user has seen the onboarding slides before
            if (localStorage.getItem('hasSeenOnboarding') === 'true') {
                // If they have, send them to the main home feed.
                // The @login_required decorator on that route will handle
                // redirecting them to /auth/login if they are not logged in.
                window.location.href = "{{ url_for('main.index') }}";
            } else {
                // If they haven't, send them to the onboarding slides.
                window.location.href = "{{ url_for('main.onboarding') }}";
            }
        });
    </script>
</body>
</html>
