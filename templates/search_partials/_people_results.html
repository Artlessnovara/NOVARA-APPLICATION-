<h5 class="mb-3 text-light">People</h5>
{% for user in people_results %}
<div class="card mb-2 result-card">
    <div class="card-body d-flex align-items-center">
        <img src="https://via.placeholder.com/50" class="rounded-circle mr-3" alt="Avatar">
        <div class="flex-grow-1">
            <a href="{{ url_for('main.profile', user_id=user.id) }}" class="text-light stretched-link"><h6 class="card-title mb-0">{{ user.full_name }}</h6></a>
            <small class="text-muted">{{ user.role }}</small>
        </div>
        <a href="#" class="btn btn-primary btn-sm follow-btn-sm" style="position: relative; z-index: 2;">Follow</a>
    </div>
</div>
{% else %}
    {% if active_tab != 'all' %}
    <p class="text-muted">No people found matching your search.</p>
    {% endif %}
{% endfor %}
<hr class="my-4">
