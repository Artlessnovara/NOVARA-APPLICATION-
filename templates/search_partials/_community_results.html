<h5 class="mb-3 text-light">Communities</h5>
{% for community in community_results %}
<div class="card mb-2 result-card">
    <div class="card-body d-flex align-items-center">
        <img src="https://via.placeholder.com/50" class="rounded mr-3" alt="Community Icon">
        <div class="flex-grow-1">
            <a href="{{ url_for('main.community_page', community_id=community.id) }}" class="text-light stretched-link"><h6 class="card-title mb-0">{{ community.name }}</h6></a>
            <small class="text-muted">{{ community.members.count() }} members</small>
        </div>
        <a href="#" class="btn btn-primary btn-sm" style="position: relative; z-index: 2;">Join</a>
    </div>
</div>
{% else %}
    {% if active_tab != 'all' %}
    <p class="text-muted">No communities found matching your search.</p>
    {% endif %}
{% endfor %}
<hr class="my-4">
